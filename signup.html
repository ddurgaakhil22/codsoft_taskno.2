<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUIZORA — Sign Up</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
      backdrop-filter: var(--blur-md);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-10);
    }

    .auth-header .logo {
      font-size: 2rem;
      margin-bottom: var(--space-3);
    }

    .auth-header h1 {
      font-size: 1.4rem;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: var(--space-5);
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all var(--transition-base);
    }

    .input:focus {
      outline: none;
      border-color: var(--neon-violet);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .input::placeholder {
      color: var(--text-muted);
    }

    .btn-signup {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      margin-top: var(--space-6);
      font-weight: 600;
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--neon-violet);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-base);
    }

    .auth-footer a:hover {
      color: #A78BFA;
    }

    .benefits {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .benefits h4 {
      color: var(--neon-violet);
      font-size: 0.9rem;
      margin-bottom: var(--space-2);
    }

    .benefits ul {
      list-style: none;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .benefits li {
      margin-bottom: var(--space-1);
      padding-left: var(--space-4);
      position: relative;
    }

    .benefits li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--neon-green);
      font-weight: bold;
    }

    @media (max-width: 480px) {
      .auth-wrapper {
        padding: var(--space-4);
      }

      .auth-card {
        max-width: 100%;
        padding: var(--space-6);
        border-radius: var(--radius-lg);
      }

      .auth-header {
        margin-bottom: var(--space-6);
      }

      .auth-header .logo {
        font-size: 1.5rem;
        margin-bottom: var(--space-2);
      }

      .auth-header h1 {
        font-size: 1.2rem;
        margin-bottom: var(--space-1);
      }

      .auth-header p {
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: var(--space-4);
      }

      .form-label {
        font-size: 0.9rem;
        margin-bottom: var(--space-1);
      }

      .input {
        padding: var(--space-2) var(--space-3);
        font-size: 0.9rem;
      }

      .btn-signup {
        padding: var(--space-2) var(--space-3);
        margin-top: var(--space-4);
        font-size: 0.95rem;
      }

      .auth-footer {
        margin-top: var(--space-4);
        font-size: 0.85rem;
      }

      .benefits {
        padding: var(--space-3);
        margin-bottom: var(--space-4);
      }

      .benefits h4 {
        font-size: 0.85rem;
        margin-bottom: var(--space-1);
      }

      .benefits ul {
        font-size: 0.8rem;
      }

      .benefits li {
        margin-bottom: var(--space-1);
        padding-left: var(--space-3);
      }
    }
  </style>
</head>
<body>
  <!-- Background orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2+"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navigation -->
  <nav class="nav" id="app-nav"></nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">🚀</div>
        <h1>Get Started</h1>
        <p>Join QUIZORA and unlock unlimited learning potential</p>
      </div>

      <div class="benefits">
        <h4>✨ With your account you get:</h4>
        <ul>
          <li>Unlimited quiz creation</li>
          <li>Full quiz library access</li>
          <li>Detailed progress tracking</li>
          <li>Leaderboard rankings</li>
        </ul>
      </div>

      <form onsubmit="handleSignupSubmit(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="input" id="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="input" id="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="input" id="password" placeholder="••••••••" minlength="8" required>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="input" id="confirm-password" placeholder="••••••••" minlength="8" required>
        </div>

        <button type="submit" class="btn btn-primary btn-signup">
          ✦ Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    async function handleSignupSubmit(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (password !== confirmPassword) {
        toast('Passwords do not match', 'error');
        return;
      }
      
      const signupBtn = e.target.querySelector('button');
      signupBtn.disabled = true;
      signupBtn.innerText = 'Creating Account...';

      try {
        const res = await fetch('http://localhost:3000/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, avatar: '🎯' })
        });

        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Signup failed');
        }

        // Store session using our existing User service
        User.set({ ...data, isLoggedIn: true });
        toast(`Welcome, ${name}! Your account is ready 🚀`, 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);

      } catch (err) {
        toast(err.message, 'error');
        signupBtn.disabled = false;
        signupBtn.innerText = '✦ Create Account';
      }
    }
  </script>
</body>
</html>
